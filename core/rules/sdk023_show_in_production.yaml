rule_id: SDK023
title: "show() left in production code"
severity: info
category: style
languages: [python, scala, java]
explanation: >-
  Each .show() call triggers a Spark action — a full job execution that materializes the DataFrame and pulls rows to the driver. A pipeline with multiple show() calls left in production runs extra jobs before the actual work begins, wasting compute and adding latency.
suggestion: >-
  Remove .show() calls from production code. If the call is intentional
  (e.g. a diagnostic pipeline), suppress with an inline comment
  (Python: # noqa: SDK023). For logging row counts, use your language's
  logging framework instead of printing to stdout.
