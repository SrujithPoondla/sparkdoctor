rule_id: SDK006
title: "repartition(1) or coalesce(1) — forces single-partition execution"
severity: error
category: performance
languages: [python, scala, java]
explanation: >-
  repartition(1) or coalesce(1) collapses the entire distributed dataset into a single partition, processed by a single executor core. This eliminates all parallelism. On a 100 GB dataset, one task processes all 100 GB sequentially. Memory pressure causes spill to disk. Runtime scales linearly with data size.
suggestion: >-
  If you need to write a single output file:

  df.write.option("maxRecordsPerFile", 1_000_000).parquet(path)
  # or
  df.coalesce(1).write.parquet(path)  # acceptable only for small DataFrames < 1 GB

  If you genuinely need one partition for downstream logic, document why explicitly. Most cases that use repartition(1) in production should not.
