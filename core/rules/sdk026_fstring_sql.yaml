rule_id: SDK026
title: "Dynamic string in spark.sql() — SQL injection risk"
severity: warning
category: correctness
languages: [python, scala, java]
explanation: >-
  Using f-strings or .format() to build SQL queries prevents Catalyst from caching query plans (each interpolated string is a unique query) and creates a SQL injection risk if any interpolated value comes from user input or external configuration.
suggestion: >-
  Use parameterized queries or DataFrame API instead:

  # Instead of: spark.sql(f"SELECT * FROM {table}")
  spark.table(table_name).select("*")
  # For filtering with variables:
  df.filter(F.col("status") == status_var)

  If you must use spark.sql(), use parameter markers (Spark 3.4+):

  spark.sql("SELECT * FROM t WHERE id = :id", args={"id": my_id})
