name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: packages/python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/sparkdoctor/ tests/

      - name: Ruff format check
        run: ruff format --check src/sparkdoctor/ tests/

      - name: Run tests
        run: pytest tests/ -v

      - name: Self-lint
        run: sparkdoctor lint src/sparkdoctor/ --exit-code --severity error

      - name: Validate rule definitions
        run: python -c "from pathlib import Path; files = list(Path('../../core/rules').glob('*.yaml')); assert len(files) >= 25, f'Expected 25+ rule files, got {len(files)}'"
